name: ML Pipeline — Insurance Fraud Detection

on:
  push:
    branches: [main]
    paths:
      - 'mlops/**'
      - 'tests/test_mlops.py'
      - '.github/workflows/ml-pipeline.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:  # Manual trigger

env:
  PYTHON_VERSION: '3.11'
  MLFLOW_TRACKING_URI: 'sqlite:///mlflow.db'
  ACCURACY_THRESHOLD: '0.75'

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1: Lint & Validate
  # ─────────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r mlops/requirements.txt
          pip install flake8

      - name: Lint with flake8
        run: |
          flake8 mlops/ --max-line-length=120 --ignore=E501,W503,E302,E303

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2: Unit Tests
  # ─────────────────────────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r mlops/requirements.txt

      - name: Generate fraud dataset
        run: python -m mlops.generate_fraud_dataset

      - name: Run unit tests
        run: |
          pytest tests/test_mlops.py -v \
            -k "not TestIntegrationPipeline" \
            --tb=short \
            --junitxml=test-results.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results.xml

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 3: Train & Register
  # ─────────────────────────────────────────────────────────────────────────────
  train:
    name: Train Models & Register
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r mlops/requirements.txt

      - name: Generate fraud dataset
        run: python -m mlops.generate_fraud_dataset

      - name: Run training pipeline
        run: |
          python -m mlops.train \
            --tracking-uri ${{ env.MLFLOW_TRACKING_URI }}

      - name: Validate accuracy threshold
        run: |
          python -c "
          import json
          with open('artifacts/training_results.json') as f:
              results = json.load(f)
          best = max(results.values(), key=lambda x: x['f1_score'])
          best_name = max(results, key=lambda k: results[k]['f1_score'])
          print(f'Champion: {best_name}')
          print(f'Accuracy: {best[\"accuracy\"]}')
          print(f'F1-Score: {best[\"f1_score\"]}')
          assert best['accuracy'] >= float('${{ env.ACCURACY_THRESHOLD }}'), \
              f'Accuracy {best[\"accuracy\"]} < threshold ${{ env.ACCURACY_THRESHOLD }}'
          print('Accuracy gate PASSED')
          "

      - name: Run integration tests
        run: |
          pytest tests/test_mlops.py -v \
            -k "TestIntegrationPipeline or TestModelAccuracyValidation" \
            --tb=short

      - name: Upload training artifacts
        uses: actions/upload-artifact@v4
        with:
          name: training-artifacts
          path: |
            artifacts/
            mlruns/

      - name: Upload MLflow database
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-db
          path: mlflow.db
