# ═══════════════════════════════════════════════════════════════════════════════
# Prometheus Configuration — Insurance Fraud API Monitoring
# ═══════════════════════════════════════════════════════════════════════════════

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # ── FastAPI Application ─────────────────────────────────────────────────────
  - job_name: "fraud-api"
    metrics_path: "/metrics"
    scrape_interval: 5s
    static_configs:
      - targets: ["fraud-api:8000"]
        labels:
          environment: "production"
          service: "fraud-detection"

  # ── Prometheus self-monitoring ──────────────────────────────────────────────
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
